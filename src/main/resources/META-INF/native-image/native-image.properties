# Native Image 配置

# 基本选项
Args = --no-fallback
Args = --enable-http
Args = --enable-https

# 资源包含
Args = -H:IncludeResources=".*\\.json$"
Args = -H:IncludeResources=".*\\.yml$"
Args = -H:IncludeResources=".*\\.properties$"
Args = -H:IncludeResources=".*\\.png$"
Args = -H:IncludeResources=".*\\.jpg$"

# 反射配置
Args = -H:ReflectionConfigurationResources=META-INF/native-image/reflection-config.json

# 初始化时机
Args = --initialize-at-build-time=org.slf4j
Args = --initialize-at-build-time=com.fasterxml.jackson

# 允许不完整的类路径
Args = --allow-incomplete-classpath

# 报告不支持的元素
Args = --report-unsupported-elements-at-runtime
