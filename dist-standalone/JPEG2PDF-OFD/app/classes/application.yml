server:
  port: 8000

spring:
  application:
    name: JPEG2PDF_OFD_Java
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  output-folder: C:/OCR/Output
  watch-folder: C:/OCR/Watch
  save-folder: C:/OCR/Save
  upload-folder: C:/OCR/temp
  ocr-engine: rapidocr
  default-language: chinese_cht
  font-path: C:/Windows/Fonts/simsun.ttc
  ofd-font-path: C:/Windows/Fonts/simsun.ttc

logging:
  level:
    root: INFO
    com.ocr.jpeg2pdf: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
